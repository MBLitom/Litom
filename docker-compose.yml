name: litom

services:
  web:
    container_name: litom_web
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-insecure-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8010}
      POSTGRES_DB: ${POSTGRES_DB:-litom}
      POSTGRES_USER: ${POSTGRES_USER:-litom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litom}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    depends_on:
      - db
      - redis

  db:
    container_name: litom_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litom
      POSTGRES_USER: litom
      POSTGRES_PASSWORD: litom
    volumes:
      - litom_postgres_data:/var/lib/postgresql/data
    ports:
      - "54330:5432"

  redis:
    container_name: litom_redis
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  litom_postgres_data:
